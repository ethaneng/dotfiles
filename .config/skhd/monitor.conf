# ################################################################ #
# Multi-Monitor Bindings
# ################################################################ #
#
# AeroSpace equivalent:
# alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'
#
# Additional bindings for direct display focus and window movement
# between monitors.
#

# Move current space to next display (with wrap-around via helper script)
alt + shift - tab : ~/.config/yabai/helpers/wrap_display.sh next

# Focus display by number (if you have multiple monitors)
# Uncomment these if you want direct display access:
# ctrl + alt - 1 : yabai -m display --focus 1
# ctrl + alt - 2 : yabai -m display --focus 2
# ctrl + alt - 3 : yabai -m display --focus 3

# Move window to display and follow focus
# Uncomment these if you want to move windows between displays:
# ctrl + cmd - 1 : yabai -m window --display 1; yabai -m display --focus 1
# ctrl + cmd - 2 : yabai -m window --display 2; yabai -m display --focus 2
# ctrl + cmd - 3 : yabai -m window --display 3; yabai -m display --focus 3

# Cycle focus through displays
# ctrl + alt - n : yabai -m display --focus next || yabai -m display --focus first
# ctrl + alt - p : yabai -m display --focus prev || yabai -m display --focus last

# Move window to next/prev display
# ctrl + cmd - n : yabai -m window --display next; yabai -m display --focus next
# ctrl + cmd - p : yabai -m window --display prev; yabai -m display --focus prev
