# ################################################################ #
# Window Resize Bindings
# ################################################################ #
#
# AeroSpace equivalent:
# alt-minus = 'resize smart -50'
# alt-equal = 'resize smart +50'
#
# Uses split ratio adjustments for smart resizing that adapts to the
# window's position in the BSP tree.
#
# Keycodes:
# 0x1B = minus (-)
# 0x18 = equal (=)
#

# Decrease window size (smart resize)
# Adjusts the split ratio by -5%
alt - 0x1B : yabai -m window --ratio rel:-0.05

# Increase window size (smart resize)
# Adjusts the split ratio by +5%
alt - 0x18 : yabai -m window --ratio rel:0.05

# Additional resize options (commented out, uncomment if preferred)
# These provide more explicit control over resize direction

# alt - 0x1B : yabai -m window --resize right:-50:0 || yabai -m window --resize left:-50:0
# alt - 0x18 : yabai -m window --resize right:50:0 || yabai -m window --resize left:50:0
