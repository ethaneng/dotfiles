# ################################################################ #
# Workspace Switching Bindings - Dual Workspace System
# ################################################################ #
#
# Project Workspaces (keys 1-9, 0):
#   alt-1 through alt-9, alt-0 = project workspaces p1-p10
#   These are renamable workspaces for project-specific work
#
# Fixed Quick-Access Workspaces (keys Y,U,I,O,P):
#   alt-y/u/i/o/p = fixed workspaces for commonly used apps
#   Always visible in the bar
#
# Requires space labels to be configured in ensure_spaces.sh:
#   Spaces 1-10: p1, p2, p3, p4, p5, p6, p7, p8, p9, p10
#   Spaces 11-15: y, u, i, o, p
#

# --- Project Workspaces (keys 1-9, 0 -> p1-p10) ---
alt - 1 : yabai -m space --focus p1
alt - 2 : yabai -m space --focus p2
alt - 3 : yabai -m space --focus p3
alt - 4 : yabai -m space --focus p4
alt - 5 : yabai -m space --focus p5
alt - 6 : yabai -m space --focus p6
alt - 7 : yabai -m space --focus p7
alt - 8 : yabai -m space --focus p8
alt - 9 : yabai -m space --focus p9
alt - 0 : yabai -m space --focus p10

# --- Fixed Quick-Access Workspaces (keys Y,U,I,O,P) ---
alt - y : yabai -m space --focus y
alt - u : yabai -m space --focus u
alt - i : yabai -m space --focus i
alt - o : yabai -m space --focus o
alt - p : yabai -m space --focus p

# Focus most recently used workspace (workspace-back-and-forth)
alt - tab : yabai -m space --focus recent
