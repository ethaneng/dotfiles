# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                  HyprSpace - Complete Default Configuration                   ║
# ║                                                                               ║
# ║  HyprSpace is an enhanced fork of AeroSpace with exclusive features:          ║
# ║  • Dwindle Layout - Binary tree-based tiling inspired by Hyprland             ║
# ║  • Centered Workspace Bar - macOS menu bar with centered workspace indicators ║
# ║  • Master Layout - Master/stack layout with configurable ratios               ║
# ║  • Niri/Scroll/Paper Layout - Scrollable window management                    ║
# ║                                                                               ║
# ║  Configuration Location: ~/.hyprspace.toml                                    ║
# ║  Documentation: https://github.com/barut/HyprSpace                            ║
# ║                                                                               ║
# ║  This file contains ALL possible configuration options with explanations.     ║
# ║  Default values are set for optimal dwindle layout experience.                ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                              STARTUP & LIFECYCLE                              ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

# Launch HyprSpace automatically when you log into macOS
# Options: true, false
start-at-login = false

# Commands to run after HyprSpace starts
# Can be a single command (string) or multiple commands (array)
# Use 'exec-and-forget' to launch apps without blocking
# Examples:
# after-startup-command = [
#   'exec-and-forget sketchybar >> $HOME/.sketchybar/service.log 2>&1',
#   # JankyBorders has a built-in detection of already running process,
#   # so it won't be run twice on AeroSpace restart
#   'exec-and-forget borders',
#   'exec-and-forget mcp-hub --p 37373 --watch -c $XDG_CONFIG_HOME/mcphub/servers.json',
#   # Launch applications on startup
#   'workspace u',
#   'exec-and-forget open /Applications/Arc.app',
#   'exec-and-forget open /Applications/WezTerm.app',
#   'workspace i',
#   'exec-and-forget open "/Applications/Microsoft Outlook.app"',
#   'workspace o',
#   'exec-and-forget open "/Applications/Microsoft Teams.app"',
#   'workspace y',
#   'exec-and-forget open /Applications/Spotify.app',
#   # Trigger initial workspace state after sketchybar starts
#   'exec-and-forget /bin/bash -c "sleep 1 && FOCUSED=$(hyprspace list-workspaces --focused) && sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$FOCUSED"',
# ]

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                            DEFAULT LAYOUT SETTINGS                            ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

# Default layout for new workspaces
# Options: 'tiles', 'accordion', 'dwindle', 'master', 'scroll' (aka 'niri' or 'paper')
# 'dwindle' - HyprSpace exclusive binary tree layout with automatic orientation
# 'master' - HyprSpace exclusive master/stack layout
# 'scroll'/'niri'/'paper' - HyprSpace exclusive scrollable layout
default-root-container-layout = 'dwindle'

# Default container orientation for tiles layout
# Options: 'horizontal', 'vertical', 'auto'
# 'auto' - Automatically choose based on screen dimensions
default-root-container-orientation = 'auto'

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                    DWINDLE LAYOUT (HYPRSPACE EXCLUSIVE)                       ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

# Split ratio for new dwindle containers
# Range: 0.1 to 1.9 (1.0 = 50/50 split)
# Examples:
#   1.0 = Equal split (50%/50%)
#   1.618 = Golden ratio split (~62%/38%)
#   0.618 = Inverse golden ratio (~38%/62%)
dwindle-default-split-ratio = 1.0

# Enforce aspect ratio for single windows in dwindle layout
# Format: [width, height] or [0, 0] to disable
# Examples:
#   [16, 9] = 16:9 widescreen
#   [4, 3] = 4:3 traditional
#   [21, 9] = 21:9 ultrawide
#   [1, 1] = Square
#   [0, 0] = Disabled (default)
dwindle-single-window-aspect-ratio = [0, 0]

# Tolerance for aspect ratio adjustments
# Range: 0.0 to 1.0
# Prevents tiny padding adjustments when window is close to target ratio
# Lower values = more strict, higher values = more lenient
dwindle-single-window-aspect-ratio-tolerance = 0.1

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                     MASTER LAYOUT (HYPRSPACE EXCLUSIVE)                       ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

# Master window width percentage
# Range: 0.1 to 0.9 (0.5 = 50% of screen)
# Examples:
#   0.5 = Equal split (50%)
#   0.618 = Golden ratio (~62%)
#   0.66 = Two-thirds (~66%)
master-default-percent = 0.618

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                SCROLL/NIRI/PAPER LAYOUT (HYPRSPACE EXCLUSIVE)                 ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

# Focused window width ratio for scroll/niri/paper layout
# Controls how much of adjacent windows you see on the sides
# Range: 0.1 to 1.0
# Lower value = more focus, higher value = more context
# Examples:
#   0.5  = 50% width (25% peek each side) - maximum context
#   0.67 = 67% width (16.5% peek each side) - balanced
#   0.8  = 80% width (10% peek each side) - default
#   0.9  = 90% width (5% peek each side) - focused
#   1.0  = 100% width (no peek) - full screen
niri-focused-width-ratio = 0.8

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                           OTHER LAYOUT SETTINGS                               ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

# Padding for accordion layout
# Range: 0 to any positive integer (pixels)
# 0 = No padding (disabled)
# 30 = Default padding
accordion-padding = 45

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                         NORMALIZATION SETTINGS                                ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

# Automatically flatten unnecessary container nesting
# Eliminates weird tree configurations for cleaner window management
# Options: true, false
enable-normalization-flatten-containers = true

# Force opposite orientation for nested containers
# Prevents same-orientation nesting (e.g., horizontal inside horizontal)
# Options: true, false
enable-normalization-opposite-orientation-for-nested-containers = true

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                           MACOS INTEGRATION                                   ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

# Automatically unhide applications hidden with cmd-h
# When true, focusing a hidden app will automatically unhide it
# Options: true, false
automatically-unhide-macos-hidden-apps = true

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                              EVENT CALLBACKS                                  ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

# Commands to run when workspace changes (deprecated but still works)
exec-on-workspace-change = [
  '/bin/bash',
  '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=${workspace}',
]

# Commands to run when focus changes
# Can be a single command (string) or multiple commands (array)
# Available variables: ${focused} ${workspace}
# Testing: According to AeroSpace docs, this should fire on workspace changes too
on-focus-changed = 'exec-and-forget ~/.config/hyprspace/helpers/notify_workspace_change.sh'

# Commands to run when focused monitor changes
# Available variables: ${focused-monitor} ${workspace}
# Example: Move mouse to center of newly focused monitor
on-focused-monitor-changed = 'move-mouse monitor-lazy-center'

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                            GAPS CONFIGURATION                                 ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

[gaps]
# Inner gaps (spacing between windows)
# Can be a constant or per-monitor configuration
inner.horizontal = 40 #20
inner.vertical = 40   #20
outer.left = 30       #15
outer.bottom = 30     #15
# outer.top = [{ monitor."SAMSUNG" = 55 }, 20]
outer.top = [{ monitor."built-in" = 20 }, 55]
outer.right = 30                              #15

# Outer gaps (spacing from screen edges)
# Format: constant integer or per-monitor array
# Per-monitor array syntax:
#   outer.top = [
#     { monitor.main = 16 },           # Main monitor gets 16px
#     { monitor."Built-in" = 32 },     # Built-in display gets 32px
#     { monitor.1 = 24 },              # First monitor in sequence gets 24px
#     24                               # Default fallback (required)
#   ]

# Example: Different gaps for different monitors (uncomment to use)
# [gaps]
# outer.top = [
#   { monitor.main = 20 },            # Main monitor menu bar spacing
#   { monitor."Built-in" = 35 },      # MacBook notch spacing
#   { monitor.secondary = 10 },       # Secondary monitor minimal spacing
#   15                                 # Default for any other monitor
# ]

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                     WORKSPACE TO MONITOR ASSIGNMENT                           ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

# Force specific workspaces to specific monitors
# Format: workspace-number = "monitor-pattern" or ["pattern1", "pattern2"]
# Monitor patterns:
#   "main" - Primary monitor
#   "secondary" - Non-primary monitors
#   1, 2, 3 - Monitor by sequence number (1-based)
#   "pattern" - Case-insensitive regex match (e.g., "Dell.*", "LG.*")
#
# Examples (uncomment to use):
# [workspace-to-monitor-force-assignment]
# 1 = "main"                          # Workspace 1 always on main monitor
# 2 = "main"                          # Workspace 2 always on main monitor
# 3 = "secondary"                     # Workspace 3 on any secondary monitor
# 4 = ["Built-in", 1]                 # Workspace 4 prefers Built-in, falls back to monitor 1
# 5 = "LG.*"                          # Workspace 5 on any LG monitor

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                            KEY MAPPING                                        ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

[key-mapping]
# Keyboard layout preset
# Options: 'qwerty', 'dvorak', 'colemak'
preset = 'qwerty'

# Custom key remapping (optional)
# Map non-standard keys to key codes
# Example (uncomment to use):
[key-mapping.key-notation-to-key-code]
# delete = 'backspace'
# capslock = 'esc'
# hyper = 'alt-shift-ctrl-cmd'

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                       EXEC ENVIRONMENT CONFIGURATION                          ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

[exec]
# Inherit environment variables from parent process
# Options: true, false
inherit-env-vars = true

[exec.env-vars]
# Environment variables for executed commands
# Supports ${VAR} interpolation for existing variables
PATH = '/opt/homebrew/bin:/opt/homebrew/sbin:${PATH}'

# Custom environment variables (examples):
# EDITOR = 'nvim'
# BROWSER = 'Safari'
# TERMINAL = 'Ghostty'

# TODO: Review below events and variables for sketchybar integration
#
# Notify Sketchybar about workspace change
# on-focus-changed = [
#   '/bin/bash',
#   '-c',
#   'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=${workspace} FOCUSED_DISPLAY=${focused-monitor}',
# ]
# Notify Sketchybar about focus change
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# on-focus-changed = [
#   'exec-and-forget sketchybar --trigger aerospace_focus_change FOCUSED_WORKSPACE=${workspace}',
#   'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=${workspace} FOCUSED_DISPLAY=${focused-monitor}',
# ]
# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                        WINDOW DETECTION RULES                                 ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

# Automatically configure windows when detected
# Available conditions:
#   - app-id: Bundle identifier (use 'hyprspace list-apps' to find)
#   - app-name-regex-substring: Partial regex match on app name
#   - window-title-regex-substring: Partial regex match on window title
#   - workspace: Current workspace name
#   - during-aerospace-startup: Only during HyprSpace startup
#
# Available commands:
#   - layout floating/tiling
#   - move-node-to-workspace (must be last command if used)
#
# Examples (uncomment and modify to use):

# # Float all Safari windows on workspace 5
# [[on-window-detected]]
# if.app-id = 'com.apple.Safari'
# if.workspace = '5'
# run = 'layout floating'

# # Tile all Zoom meetings
# [[on-window-detected]]
# if.app-name-regex-substring = '.*Zoom.*'
# if.window-title-regex-substring = '.*Meeting.*'
# run = 'layout tiling'

# # Move Ghostty to workspace 2 on startup
# [[on-window-detected]]
# if.app-id = 'com.mitchellh.ghostty'
# if.during-aerospace-startup = true
# run = 'move-node-to-workspace 2'

# # Float Calculator
# [[on-window-detected]]
# if.app-id = 'com.apple.calculator'
# run = 'layout floating'

# # Move Slack to workspace 3
# [[on-window-detected]]
# if.app-id = 'com.tinyspeck.slackmacgap'
# check-further-callbacks = false
# run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'shottr'
run = 'layout floating'

[[on-window-detected]]
if.window-title-regex-substring = 'new meeting .* microsoft teams'
run = 'layout floating'

[[on-window-detected]]
if.window-title-regex-substring = 'reminder'
run = 'layout floating'

[[on-window-detected]]
if.window-title-regex-substring = 'Picture-in-Picture'
run = 'layout floating'

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                          MAIN MODE KEYBINDINGS                                ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

[mode.main.binding]

# ──────────────────────────────────────────────────────────────────────────────
#                              FOCUS MOVEMENT
# ──────────────────────────────────────────────────────────────────────────────

# Arrow key navigation for focusing windows
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# ──────────────────────────────────────────────────────────────────────────────
#                              WINDOW MOVEMENT
# ──────────────────────────────────────────────────────────────────────────────

# Move windows with arrow keys
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# ──────────────────────────────────────────────────────────────────────────────
#                            WORKSPACE SWITCHING
# ──────────────────────────────────────────────────────────────────────────────

# Switch to workspaces using QWERTYUIOP keys
alt-q = 'workspace q'
alt-w = 'workspace w'
alt-e = 'workspace e'
alt-r = 'workspace r'
alt-t = 'workspace t'
alt-y = 'workspace y'
alt-u = 'workspace u'
alt-i = 'workspace i'
alt-o = 'workspace o'
alt-p = 'workspace p'

# Move windows to workspaces using QWERTYUIOP keys
alt-cmd-q = 'move-node-to-workspace q'
alt-cmd-w = 'move-node-to-workspace w'
alt-cmd-e = 'move-node-to-workspace e'
alt-cmd-r = 'move-node-to-workspace r'
alt-cmd-t = 'move-node-to-workspace t'
alt-cmd-y = 'move-node-to-workspace y'
alt-cmd-u = 'move-node-to-workspace u'
alt-cmd-i = 'move-node-to-workspace i'
alt-cmd-o = 'move-node-to-workspace o'
alt-cmd-p = 'move-node-to-workspace p'

# Navigate workspaces sequentially
# alt-tab = 'workspace next'
# alt-shift-tab = 'workspace prev'

# Navigate back and forth between workspaces
alt-tab = 'workspace-back-and-forth'
alt-ctrl-shift-cmd-tab = 'workspace-back-and-forth'
# Move workspaces to other monitor
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# ──────────────────────────────────────────────────────────────────────────────
#                              LAYOUT COMMANDS
# ──────────────────────────────────────────────────────────────────────────────

# Layout switching (HyprSpace exclusive layouts included)
alt-n = 'layout dwindle'                           # HyprSpace exclusive
alt-slash = 'layout tiles horizontal vertical'     # Traditional tiling
alt-comma = 'layout accordion horizontal vertical' # Accordion (one window visible)
alt-m = 'layout master'                            # HyprSpace exclusive master/stack
alt-period = 'layout scroll'                       # HyprSpace exclusive scrollable

# Toggle between floating and tiling for current window
alt-f = 'layout floating tiling'

# Balance window sizes (reset to equal sizes)
# Especially useful after manual resizing in dwindle layout
# alt-b = 'balance-sizes'

# ──────────────────────────────────────────────────────────────────────────────
#                            WINDOW RESIZING
# ──────────────────────────────────────────────────────────────────────────────

# Direct resize - immediate size adjustment without entering a mode
alt-equal = 'resize smart -50'
alt-minus = 'resize smart +50'

# Alternative: Modal resize (requires entering resize mode first)
# Uncomment the following line to enable resize mode
# alt-r = 'mode resize'

# ──────────────────────────────────────────────────────────────────────────────
#                            WINDOW MANAGEMENT
# ──────────────────────────────────────────────────────────────────────────────

# Close focused window
alt-shift-q = 'close'

# Regular fullscreen toggle
alt-z = 'fullscreen'

# Pseudo-fullscreen toggle (centered floating window with monocle blur)
shift-alt-z = [
  'exec-and-forget ~/.config/hyprspace/helpers/toggle_monocle.sh',
  'exec-and-forget ~/.config/hyprspace/helpers/toggle_pseudo_fullscreen.sh',
  'exec-and-forget sketchybar --trigger aerospace_fullscreen_change',
  'exec-and-forget ~/.config/hyprspace/helpers/update_borders.sh',
]

# Split orientation (for tiles layout)
# NOTE: Disabled because enable-normalization-flatten-containers = true
# Uncomment and set enable-normalization-flatten-containers = false to use split commands
# alt-shift-slash = 'split opposite'

# Flatten container (remove unnecessary nesting)
alt-shift-f = 'flatten-workspace-tree'

# ──────────────────────────────────────────────────────────────────────────────
#                          APPLICATION LAUNCHING
# ──────────────────────────────────────────────────────────────────────────────

# Launch terminal (Wezterm)
alt-enter = 'exec-and-forget open -n /Applications/WezTerm.app'

# ──────────────────────────────────────────────────────────────────────────────
#                           SYSTEM COMMANDS
# ──────────────────────────────────────────────────────────────────────────────

# Reload configuration
# alt-cmd-shift-r = 'reload-config'

# Enable/disable HyprSpace (crisis key)
# alt-cmd-shift-e = 'enable toggle'

# ──────────────────────────────────────────────────────────────────────────────
#                             MODE SWITCHING
# ──────────────────────────────────────────────────────────────────────────────

# (Mode switching moved to alternative resize option above)

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║              RESIZE MODE KEYBINDINGS (ALTERNATIVE METHOD)                     ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

# Alternative: Modal resize configuration
# To use modal resize instead of direct resize, uncomment this entire section
# and the 'alt-r = mode resize' line in the Window Resizing section above

# [mode.resize.binding]
#
# # ──────────────────────────────────────────────────────────────────────────────
# #                            RESIZE WITH ARROWS
# # ──────────────────────────────────────────────────────────────────────────────
#
# # Fine-grained resizing (50 pixels)
# left = 'resize width -50'
# down = 'resize height +50'
# up = 'resize height -50'
# right = 'resize width +50'
#
# # Coarse resizing (200 pixels)
# shift-left = 'resize width -200'
# shift-down = 'resize height +200'
# shift-up = 'resize height -200'
# shift-right = 'resize width +200'
#
# # Alternative: Vim-style resizing
# # h = 'resize width -50'
# # j = 'resize height +50'
# # k = 'resize height -50'
# # l = 'resize width +50'
# # shift-h = 'resize width -200'
# # shift-j = 'resize height +200'
# # shift-k = 'resize height -200'
# # shift-l = 'resize width +200'
#
# # ──────────────────────────────────────────────────────────────────────────────
# #                            MODE NAVIGATION
# # ──────────────────────────────────────────────────────────────────────────────
#
# # Return to main mode
# esc = 'mode main'
# alt-r = 'mode main'
# enter = 'mode main'
alt-semicolon = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main'] # reset layout
f = [
  'layout floating tiling',
  'mode main',
] # Toggle between floating and tiling layout
backspace = ['close-all-windows-but-current', 'mode main']

alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'
alt-shift-h = ['join-with left']
alt-shift-j = ['join-with down']
alt-shift-k = ['join-with up']
alt-shift-l = ['join-with right']
# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                     CENTERED WORKSPACE BAR SETTINGS                           ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │  IMPORTANT: Centered Workspace Bar is configured through the GUI, not TOML  │
# │                                                                             │
# │  To configure the centered workspace bar:                                   │
# │  1. Click the HyprSpace menu bar icon                                       │
# │  2. Select "Experimental UI Settings"                                       │
# │  3. Configure the following options:                                        │
# │                                                                             │
# │  • Enable Centered Bar: Toggle the bar on/off                               │
# │  • Show Numbers: Display workspace numbers                                  │
# │  • Show Mode Indicator: Show current binding mode (main/resize)             │
# │  • Window Level: Z-index (popup recommended)                                │
# │  • Position: overlappingMenuBar or belowMenuBar                             │
# │  • Notch Aware: Shift right of MacBook Pro notch                            │
# │  • Deduplicate Icons: Group same-app windows                                │
# │  • Hide Empty Workspaces: Only show occupied workspaces                     │
# │                                                                             │
# │  These settings are stored in macOS UserDefaults, not in this TOML file.    │
# └─────────────────────────────────────────────────────────────────────────────┘

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                         AVAILABLE KEY CODES REFERENCE                         ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

# Letters: a-z
# Numbers: 0-9
# Keypad: keypad0-keypad9
# F-keys: f1-f20
#
# Special Keys:
# - minus, equal, period, comma, slash, backslash
# - quote, semicolon, backtick
# - leftSquareBracket, rightSquareBracket
# - space, enter, esc, backspace, tab
# - pageUp, pageDown, home, end, forwardDelete
# - sectionSign (ISO keyboards only)
#
# Keypad Special:
# - keypadClear, keypadDecimalMark, keypadDivide
# - keypadEnter, keypadEqual, keypadMinus
# - keypadMultiply, keypadPlus
#
# Arrows: left, down, up, right
#
# Modifiers (combine with keys):
# - cmd (Command ⌘)
# - alt (Option ⌥)
# - ctrl (Control ⌃)
# - shift (Shift ⇧)

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                           DEPRECATED OPTIONS                                  ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

# The following options are deprecated and kept here for reference only:
#
# after-login-command (deprecated since AeroSpace 0.19.0)
#   → Use: after-startup-command
#
# exec-on-workspace-change (deprecated)
#   → Use: on-focus-changed with ${workspace} variable
#
# non-empty-workspaces-root-containers-layout-on-startup (removed)
#   → No replacement, feature removed
#
# indent-for-nested-containers-with-the-same-orientation (removed)
#   → No replacement, feature removed
