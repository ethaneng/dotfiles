"$schema" = "https://yazi-rs.github.io/schemas/keymap.json"

[mgr]

prepend_keymap = [
  # Goto
  { on = [
    "g",
    "h",
  ], run = "cd ~", desc = "Go home" },
  { on = [
    "g",
    "c",
  ], run = "cd ~/dotfiles/.config", desc = "Go ~/dotfiles/.config" },
  { on = [
    "g",
    "d",
  ], run = "cd ~/Downloads", desc = "Go ~/Downloads" },
  { on = [
    "g",
    "D",
  ], run = "cd ~/Documents", desc = "Go ~/Documents" },
  { on = [
    "g",
    "r",
  ], run = "cd ~/repos", desc = "Go ~/repos" },
  { on = [
    "g",
    "<Space>",
  ], run = "cd --interactive", desc = "Jump interactively" },
  { on = [
    "g",
    "f",
  ], run = "follow", desc = "Follow hovered symlink" },
]
