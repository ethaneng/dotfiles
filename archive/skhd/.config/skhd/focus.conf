# ################################################################ #
# Window Focus Bindings
# ################################################################ #
#
# AeroSpace equivalent:
# alt-h = 'focus left --boundaries all-monitors-outer-frame'
# alt-j = 'focus down --boundaries all-monitors-outer-frame'
# alt-k = 'focus up --boundaries all-monitors-outer-frame'
# alt-l = 'focus right --boundaries all-monitors-outer-frame'
#
# These bindings include monitor wrap-around support using fallback
# logic. If there's no window in the direction, it will attempt to
# focus the adjacent monitor.
#

# Focus window west, fallback to focusing west display
alt - h : yabai -m window --focus west || yabai -m display --focus west

# Focus window south, fallback to stack.next, then south display
# In BSP layout: focuses south window
# In stack layout: focuses next window in stack
alt - j : yabai -m window --focus south || yabai -m window --focus stack.next || yabai -m display --focus south

# Focus window north, fallback to stack.prev, then north display
# In BSP layout: focuses north window
# In stack layout: focuses previous window in stack
alt - k : yabai -m window --focus north || yabai -m window --focus stack.prev || yabai -m display --focus north

# Focus window east, fallback to focusing east display
alt - l : yabai -m window --focus east || yabai -m display --focus east
