# ################################################################ #
# Layout Management Bindings
# ################################################################ #
#
# AeroSpace equivalent:
# alt-slash = 'layout tiles horizontal vertical'
# alt-comma = 'layout accordion horizontal vertical'
# alt-z = ['fullscreen', ...]
# alt-f = ['layout floating tiling', ...]
#
# Keycodes:
# 0x2C = slash (/)
# 0x2B = comma (,)
#
# Note: Yabai doesn't have exact equivalents to AeroSpace's "tiles"
# and "accordion" layouts. BSP (Binary Space Partition) is closest
# to "tiles", and stack layout is closest to "accordion".
#

# Toggle between BSP layout (closest to tiles)
# BSP splits space into binary partitions
alt - 0x2C : yabai -m space --layout bsp

# Toggle to stack layout (closest to accordion)
# Stack layout stacks windows vertically
alt - 0x2B : yabai -m space --layout stack

# Toggle fullscreen for focused window
# Also triggers sketchybar update and borders script
alt - z : \
  yabai -m window --toggle zoom-fullscreen; \
  sketchybar --trigger yabai_fullscreen_change
  # ~/.config/yabai/helpers/update_borders.sh

# Toggle floating for focused window
# Floats window and centers it with reasonable size
alt - f : yabai -m window --toggle float --grid 20:20:1:1:18:18

# Additional layout commands (optional, currently commented)
# Uncomment if you want these features:

# Rotate tree 90 degrees clockwise
# alt - r : yabai -m space --rotate 90

# Mirror tree along y-axis
# alt - x : yabai -m space --mirror y-axis

# Mirror tree along x-axis
# alt - y : yabai -m space --mirror x-axis

# Balance window sizes in current space
# shift + alt - 0 : yabai -m space --balance
