# ################################################################ #
# Mode Declarations and Bindings
# ################################################################ #
#
# AeroSpace equivalent:
# alt-semicolon = 'mode service'
#
# [mode.service.binding]
# esc = ['reload-config', 'mode main']
# r = ['flatten-workspace-tree', 'mode main']
# f = ['layout floating tiling', 'mode main']
# backspace = ['close-all-windows-but-current', 'mode main']
# alt-shift-h/j/k/l = ['join-with left/down/up/right']
#
# Service mode provides advanced window management operations.
# Visual feedback via border color change.
#
# Keycode:
# 0x29 = semicolon (;)
#

# Define service mode with visual feedback (red border)
# Note: Theme colors sourced in yabairc, using hardcoded values here for skhd
:: service @ : source ~/.config/theme/colors.sh && yabai -m config active_window_border_color $THEME_SERVICE

# Enter service mode
alt - 0x29 : skhd -k "escape"; skhd --set-mode service

# Exit service mode, restore border color, and reload yabai
service < escape : \
  skhd --set-mode default; \
  source ~/.config/theme/colors.sh && yabai -m config active_window_border_color $THEME_BORDER_ACTIVE; \
  yabai --restart-service

# Balance windows in current space (flatten-workspace-tree equivalent)
service < r : \
  yabai -m space --balance; \
  skhd --set-mode default; \
  source ~/.config/theme/colors.sh && yabai -m config active_window_border_color $THEME_BORDER_ACTIVE

# Toggle floating layout
service < f : \
  yabai -m window --toggle float; \
  skhd --set-mode default; \
  source ~/.config/theme/colors.sh && yabai -m config active_window_border_color $THEME_BORDER_ACTIVE

# Close all windows except current
service < backspace : \
  ~/.config/yabai/helpers/close_others.sh; \
  skhd --set-mode default; \
  source ~/.config/theme/colors.sh && yabai -m config active_window_border_color $THEME_BORDER_ACTIVE

# Service mode focus (same as main mode)
service < alt - h : yabai -m window --focus west
service < alt - j : yabai -m window --focus south
service < alt - k : yabai -m window --focus north
service < alt - l : yabai -m window --focus east

# Service mode window movement using --warp (restructures BSP tree)
# This is closer to AeroSpace's 'join-with' behavior for advanced operations
service < alt + shift - h : yabai -m window --warp west
service < alt + shift - j : yabai -m window --warp south
service < alt + shift - k : yabai -m window --warp north
service < alt + shift - l : yabai -m window --warp east

# Additional service mode operations (optional)
# Uncomment if you want these features in service mode:

# Toggle split orientation
# service < e : yabai -m window --toggle split

# Toggle sticky (window appears on all spaces)
# service < s : yabai -m window --toggle sticky

# Toggle picture-in-picture
# service < p : yabai -m window --toggle sticky --toggle pip

# Rotate tree
# service < shift - r : yabai -m space --rotate 90

# Mirror tree
# service < x : yabai -m space --mirror x-axis
# service < y : yabai -m space --mirror y-axis
