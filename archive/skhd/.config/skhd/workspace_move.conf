# ################################################################ #
# Move Window to Workspace Bindings - Dual Workspace System
# ################################################################ #
#
# alt+cmd + key = move window to workspace and follow focus
#
# Project Workspaces (keys 1-9, 0):
#   alt+cmd-1 through alt+cmd-9, alt+cmd-0 = move to p1-p10
#
# Fixed Quick-Access Workspaces (keys Y,U,I,O,P):
#   alt+cmd-y/u/i/o/p = move to fixed workspaces
#

# --- Move to Project Workspaces ---
alt + cmd - 1 : yabai -m window --space p1; yabai -m space --focus p1
alt + cmd - 2 : yabai -m window --space p2; yabai -m space --focus p2
alt + cmd - 3 : yabai -m window --space p3; yabai -m space --focus p3
alt + cmd - 4 : yabai -m window --space p4; yabai -m space --focus p4
alt + cmd - 5 : yabai -m window --space p5; yabai -m space --focus p5
alt + cmd - 6 : yabai -m window --space p6; yabai -m space --focus p6
alt + cmd - 7 : yabai -m window --space p7; yabai -m space --focus p7
alt + cmd - 8 : yabai -m window --space p8; yabai -m space --focus p8
alt + cmd - 9 : yabai -m window --space p9; yabai -m space --focus p9
alt + cmd - 0 : yabai -m window --space p10; yabai -m space --focus p10

# --- Move to Fixed Workspaces ---
alt + cmd - y : yabai -m window --space y; yabai -m space --focus y
alt + cmd - u : yabai -m window --space u; yabai -m space --focus u
alt + cmd - i : yabai -m window --space i; yabai -m space --focus i
alt + cmd - o : yabai -m window --space o; yabai -m space --focus o
alt + cmd - p : yabai -m window --space p; yabai -m space --focus p
