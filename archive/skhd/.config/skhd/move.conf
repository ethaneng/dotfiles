# ################################################################ #
# Window Movement Bindings
# ################################################################ #
#
# AeroSpace equivalent:
# alt-shift-h = 'move left'
# alt-shift-j = 'move down'
# alt-shift-k = 'move up'
# alt-shift-l = 'move right'
#
# Uses --swap for predictable window swapping that preserves BSP tree
# structure. For advanced tree restructuring, use service mode (which
# uses --warp instead).
#

# Swap window with window to the west
shift + alt - h : yabai -m window --swap west

# Swap window with window to the south
shift + alt - j : yabai -m window --swap south

# Swap window with window to the north
shift + alt - k : yabai -m window --swap north

# Swap window with window to the east
shift + alt - l : yabai -m window --swap east
