[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'shottr'
run = 'layout floating'

[[on-window-detected]]
if.window-title-regex-substring = 'new meeting .* microsoft teams'
run = 'layout floating'

[[on-window-detected]]
if.window-title-regex-substring = 'reminder'
run = 'layout floating'

[[on-window-detected]]
if.window-title-regex-substring = 'Picture-in-Picture'
run = 'layout floating'
